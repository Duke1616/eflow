syntax = "proto3";

package ealert.template.v1;

import "ealert/notification/v1/notification.proto";

option go_package = "ealert.template/v1;template";

// 模板可见范围
enum Scope {
  // 未指定可见范围
  SCOPE_UNSPECIFIED = 0;
  // 租户专属
  TENANT = 1;
  // 全局共享
  GLOBAL = 2;
}

// Template definitions
message ChannelTemplate {
  int64 id = 1;
  int64 owner_id = 2;
  string name = 3;
  string description = 4;
  notification.v1.Channel channel = 5;
  int64 active_version_id = 6;
  int64 ctime = 7;
  int64 utime = 8;
  repeated ChannelTemplateVersion versions = 9;
  Scope scope = 10;
}

message ChannelTemplateVersion {
  int64 id = 1;
  int64 channel_template_id = 2;
  string name = 3;
  string signature = 4;
  string content = 5;
  string desc = 6;
  int64 ctime = 7;
  int64 utime = 8;
}

// 模板集：按渠道聚合多个渠道模板
message TemplateSet {
  int64 id = 1;                         // 模板集ID
  string key = 2;                       // 业务唯一标识，用于幂等创建
  int64 biz_id = 3;                     // 业务ID，说明模板集归属的业务
  int64 owner_id = 4;                   // 拥有者ID
  string name = 5;                      // 模板集名称
  string description = 6;               // 模板集描述
  Scope scope = 7;                      // 可见范围
  int64 ctime = 8;                      // 创建时间
  int64 utime = 9;                      // 更新时间
  repeated TemplateSetItem items = 10;  // 模板集条目
}

// 模板集条目：某渠道对应的具体渠道模板
message TemplateSetItem {
  int64 id = 1;                         // 条目ID
  int64 set_id = 2;                     // 模板集ID
  notification.v1.Channel channel = 3;  // 渠道类型
  int64 template_id = 4;                // 渠道模板ID
  int64 ctime = 5;                      // 创建时间
}

// 模版服务
service TemplateService {
  // GetTemplateByID 根据ID获取模板
  rpc GetTemplateByID(GetTemplateByIDRequest) returns (GetTemplateByIDResponse);
  // CreateTemplate 创建模版
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  // UpdateTemplate 更新模板
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);
  // PublishTemplate 发布模板，将指定版本设置为活跃版本
  rpc PublishTemplate(PublishTemplateRequest) returns (PublishTemplateResponse);
  // ListTemplates 获取模版列表
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  // CreateTemplateVersion 基于已有版本创建新版本
  rpc CreateTemplateVersion(CreateTemplateVersionRequest) returns (CreateTemplateVersionResponse);
  // CreateTemplateSet 创建模板集，供远端业务系统接入模板集
  rpc CreateTemplateSet(CreateTemplateSetRequest) returns (CreateTemplateSetResponse);
  // ResolveTemplateSet 根据业务ID和模板集唯一标识解析模板集
  rpc ResolveTemplateSet(ResolveTemplateSetRequest) returns (ResolveTemplateSetResponse);
  // ResolveTemplateID 根据业务ID、模板集唯一标识和渠道解析渠道模板ID
  rpc ResolveTemplateID(ResolveTemplateIDRequest) returns (ResolveTemplateIDResponse);
}

// GetTemplateByIDRequest 获取模板请求
message GetTemplateByIDRequest {
  int64 id = 1; // 模板ID
}

// GetTemplateByIDResponse 获取模板响应
message GetTemplateByIDResponse {
  ChannelTemplate template = 1; // 模板详情
}

// CreateTemplateRequest 创建模板请求
message CreateTemplateRequest {
  ChannelTemplate template = 1; // 模板信息
}

// CreateTemplateResponse 创建模板响应
message CreateTemplateResponse {
  ChannelTemplate template = 1; // 创建后的模板信息
}

// UpdateTemplateRequest 更新模板请求
message UpdateTemplateRequest {
  ChannelTemplate template = 1; // 待更新的模板信息
}

// UpdateTemplateResponse 更新模板响应
message UpdateTemplateResponse {}


// PublishTemplateRequest 发布模板请求
message PublishTemplateRequest {
  int64 template_id = 1; // 模板ID
  int64 version_id = 2;  // 版本ID
}

// PublishTemplateResponse 发布模板响应
message PublishTemplateResponse {}

// ListTemplatesRequest 获取模版列表请求
message ListTemplatesRequest {
  int32 offset = 1; // 偏移量
  int32 limit = 2;  // 限制数量
}

// ListTemplatesResponse 获取模版列表响应
message ListTemplatesResponse {
  repeated ChannelTemplate templates = 1; // 模版列表
  int64 total = 2; // 总数
}

// CreateTemplateVersionRequest 创建版本请求
message CreateTemplateVersionRequest {
  int64 template_id = 1; // 模板ID
  string name = 2;       // 版本名称
  string signature = 3;  // 签名
  string content = 4;    // 模板内容
  string desc = 5;       // 版本描述
}

// CreateTemplateVersionResponse 创建版本响应
message CreateTemplateVersionResponse {
  ChannelTemplateVersion version = 1; // 创建后的版本信息
}

// CreateTemplateSetRequest 创建模板集请求
message CreateTemplateSetRequest {
  string key = 1;                      // 业务唯一标识，用于幂等创建
  int64 biz_id = 2;                    // 业务ID
  int64 owner_id = 3;                  // 拥有者ID
  string name = 4;                     // 模板集名称
  string description = 5;              // 模板集描述
  Scope scope = 6;                     // 可见范围
  repeated TemplateSetItem items = 7;  // 可选：创建后追加的模板集条目
}

// CreateTemplateSetResponse 创建模板集响应
message CreateTemplateSetResponse {
  TemplateSet template_set = 1; // 创建后的模板集信息
}

// ResolveTemplateSetRequest 解析模板集请求
message ResolveTemplateSetRequest {
  int64 biz_id = 1;  // 业务ID
  string key = 2;    // 模板集业务唯一标识
}

// ResolveTemplateSetResponse 解析模板集响应
message ResolveTemplateSetResponse {
  TemplateSet template_set = 1; // 模板集信息，未命中时为空
}

// ResolveTemplateIDRequest 解析模板ID请求
message ResolveTemplateIDRequest {
  int64 biz_id = 1;                     // 业务ID
  string key = 2;                       // 模板集业务唯一标识
  notification.v1.Channel channel = 3;  // 渠道类型
}

// ResolveTemplateIDResponse 解析模板ID响应
message ResolveTemplateIDResponse {
  int64 template_id = 1;      // 渠道模板ID，0表示未命中
  int64 template_set_id = 2;  // 模板集ID，0表示未命中
}
