source:
  mongo:
    dsn: "mongodb://user:password@127.0.0.1:27017/ecmdb"
    database: "ecmdb"

destination:
  mysql:
    dsn: "user:password@tcp(127.0.0.1:3306)/ticket?charset=utf8mb4&parseTime=True&loc=Local"

migration:
  batch_size: 100
  timeout: "10m"
  auto_migrate: true
  reset_auto_increment: true
  truncate: false
  dry_run: false
